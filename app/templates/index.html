<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python CRUD App with Flask</title>
    <!-- Bootswatch-->
    <link rel="stylesheet" href="https://bootswatch.com/5/superhero/bootstrap.min.css">
    <script src="{{ url_for('static', filename= '/js/main.js')}}" defer></script>
</head>
<body class="dark">
    
    <div class="container">
        <div class="col-md-4 offset-md-4">
            <br><br><h1 class="text-center mb-4">Flask MySQL CRUD</h1>
            <form id="userForm" class="card card-body text-white" style="background-color: rgb(72, 72, 87) ;">
                <label for="username">Username</label>
                <input type="text"
                name="username"
                placeholder="Username"
                class="form-control mb-2"
                required
                >
                <label for="email">E-mail</label>
                <input type="email"
                name="email"
                placeholder="email@mail.com"
                class="form-control mb-2"
                required
                >
                <label for="password">Password</label>
                <input type="password"
                name="password"
                placeholder="Insert your password"
                class="form-control mb-2"
                required
                >
                <button class="btn btn-primary">Save</button>                
            </form>
            <ul id="userList" class="mt-4 list-unstyled p-0"></ul>
        </div>
    </div>
</body>
</html>
